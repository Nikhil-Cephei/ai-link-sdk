plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.ailinksdk'
version = '0.1.0'

android {
  namespace "expo.modules.ailinksdk"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation 'com.github.elinkthings:AILinkSDKRepositoryAndroid:1.15.08'
  implementation 'com.github.elinkthings:AILinkSDKParsingLibraryAndroid:1.9.18'
}
